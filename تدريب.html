<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نموذج توظيف - شركتك</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        .container { background: #fff; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h2 { color: #333; text-align: center; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #666; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        button:hover { background: #218838; }
    </style>
</head>
<body>

<div class="container">
    <h2>طلب انضمام للشركة</h2>
    <form action="https://formsubmit.co/gasersedeek@gmail.com" method="POST">
        <div class="form-group">
            <label>الاسم الكامل:</label>
            <input type="text" name="name" required>
        </div>
        <div class="form-group">
            <label>البريد الإلكتروني:</label>
            <input type="email" name="email" required>
        </div>
        <div class="form-group">
            <label>رقم الهاتف:</label>
            <input type="tel" name="phone" required>
        </div>
        <div class="form-group">
            <label>الوظيفة المستهدفة:</label>
            <select name="job_title">
                <option value="developer">مبرمج</option>
                <option value="designer">مصمم</option>
                <option value="marketing">تسويق</option>
            </select>
        </div>
        <div class="form-group">
            <label>نبذة عنك:</label>
            <textarea name="bio" rows="4"></textarea>
        </div>
        <button type="submit">إرسال الطلب</button>
    </form>
</div>

</body>
</html>
